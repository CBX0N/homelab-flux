#--- # Wireguard PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wireguard-pv-claim
  namespace: default
  labels:
    app: wireguard
spec:
  storageClassName: manual
  volumeName: wireguard-pv
  resources:
    requests:
      storage: 5Gi
  accessModes:
    - ReadWriteOnce