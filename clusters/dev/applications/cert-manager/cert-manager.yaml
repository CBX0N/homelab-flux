apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: cert-manager
      version: "1.17.1"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: default
      interval: 10m
      createNamespace: true
      targetNamespace: cert-manager
  values:
    installCRDs: true