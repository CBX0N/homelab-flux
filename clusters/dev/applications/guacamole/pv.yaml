apiVersion: v1
kind: PersistentVolume
metadata:
  name: guacamole-pv
  namespace: guacamole
  labels:
    app: guacamole
spec:
  storageClassName: manual
  capacity:
    storage: 15Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nfsvers=4.1
  nfs:      
    path: /mnt/nfs/data/configs/postgres
    server: 192.168.20.20
