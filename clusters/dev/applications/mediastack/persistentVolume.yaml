#--- #Qbit PV
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbit-pv
  namespace: mediastack
  labels:
    app: mediastack
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  storageClassName: manual
  mountOptions:
    - hard
    - nfsvers=4.1
  nfs:      
    path: /mnt/data/configs/qbit
    server: 192.168.0.250
