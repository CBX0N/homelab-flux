#--- # Qbit PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbit-pv-claim
  namespace: default
  labels:
    app: mediastack
spec:
  storageClassName: manual
  volumeName: qbit-pv
  resources:
    requests:
      storage: 5Gi
  accessModes:
    - ReadWriteOnce
