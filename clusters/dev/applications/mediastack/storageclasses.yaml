#--- #Downloads SC
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-downloads
  namespace: mediastack
provisioner: nfs.csi.k8s.io
allowVolumeExpansion: true
parameters:
  server: 192.168.0.250
  share: /mnt/data/downloads
mountOptions:
  - hard
  - nfsvers=4.1
