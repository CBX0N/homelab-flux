apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-mediastack
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "cert-cluster-issuer"
    nginx.ingress.kubernetes.io/rewrite-target: /
  labels:
    app: mediastack
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - radarr.cbxon.co.uk
    - sonarr.cbxon.co.uk
    - jellyfin.cbxon.co.uk
    - prowlarr.cbxon.co.uk
    - qbittorrent.cbxon.co.uk
    secretName: cert-mediastack
  rules:
  - host: raddar.cbxon.co.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: radarr-http
            port:
              number: 7878
  - host: sonarr.cbxon.co.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sonarr-http
            port:
              number: 8989
  - host: jellyfin.cbxon.co.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jellyfin-http
            port:
              number: 8096
  - host: prowlarr.cbxon.co.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prowlarr-http
            port:
              number: 9696
  - host: qbittorrent.cbxon.co.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qbit-http
            port:
              number: 8080