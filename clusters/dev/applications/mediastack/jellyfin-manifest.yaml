apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-pv
  namespace: default
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  storageClassName: manual
  hostPath:
    path: /cluster/config/jellyfin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-pv-claim
  namespace: default
spec:
  storageClassName: manual
  volumeName: jellyfin-pv
  resources:
    requests:
      storage: 5Gi
  accessModes:
    - ReadWriteOnce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mediastack
  name: jellyfin
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediastack
  template:
    metadata:
      labels:
        app: mediastack
    spec:
      volumes:
        - name: jellyfin-config
          persistentVolumeClaim:
            claimName: jellyfin-pv-claim
        - name: tv
          nfs:
            server: 192.168.20.20
            path: /mnt/nfs/data/tv
        - name: movies
          nfs:
            server: 192.168.20.20
            path: /mnt/nfs/data/movies
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin
        ports:
          - containerPort: 8096
            name: jellyfin-http
          - containerPort: 8920
            name: jellyfin-https
          - containerPort: 1900
            name: jellyfin-serv
            protocol: UDP
          - containerPort: 7359
            name: jellyfin-client
            protocol: UDP
        env:
          - name: PUID
            value: "1000"
          - name: PGID
            value: "1000"
          - name: TZ
            value: "Etc/UTC"
        volumeMounts:
          - mountPath: "/config"
            name: jellyfin-config
          - mountPath: "/tv"
            name: tv
          - mountPath: "/movies"
            name: movies
      dnsPolicy: ClusterFirst
      restartPolicy: Always